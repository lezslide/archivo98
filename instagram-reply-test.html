<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Instagram Private Reply Test</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #111827;
        color: #f9fafb;
      }

      .wrap {
        max-width: 720px;
        margin: 48px auto;
        padding: 24px;
      }

      .card {
        background: #1f2937;
        border: 1px solid #374151;
        border-radius: 14px;
        padding: 24px;
      }

      h1 {
        margin-top: 0;
        font-size: 28px;
      }

      p {
        color: #d1d5db;
        line-height: 1.5;
      }

      label {
        display: block;
        margin: 18px 0 8px;
        font-weight: 700;
      }

      input,
      textarea,
      button {
        width: 100%;
        box-sizing: border-box;
        border-radius: 10px;
        border: 1px solid #4b5563;
        padding: 12px 14px;
        font: inherit;
      }

      input,
      textarea {
        background: #111827;
        color: #f9fafb;
      }

      textarea {
        min-height: 100px;
        resize: vertical;
      }

      button {
        margin-top: 18px;
        background: #2563eb;
        color: white;
        border: none;
        font-weight: 700;
        cursor: pointer;
      }

      pre {
        margin-top: 20px;
        background: #0b1220;
        border: 1px solid #374151;
        border-radius: 10px;
        padding: 16px;
        overflow: auto;
        white-space: pre-wrap;
        word-break: break-word;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="card">
        <h1>Instagram Private Reply Test</h1>
        <p>Pega un comment ID real y manda una prueba directa al endpoint manual.</p>

        <label for="comment-id">Comment ID</label>
        <input id="comment-id" type="text" value="17937298404204675" />

        <label for="message">Mensaje</label>
        <textarea id="message">Prueba privada desde endpoint manual</textarea>

        <button id="send-button" type="button">Enviar prueba</button>

        <pre id="output">Esperando prueba...</pre>
      </section>
    </main>

    <script>
      const commentIdInput = document.getElementById("comment-id");
      const messageInput = document.getElementById("message");
      const output = document.getElementById("output");
      const sendButton = document.getElementById("send-button");

      async function sendTest() {
        output.textContent = "Enviando...";

        try {
          const response = await fetch("/api/instagram-private-reply-test", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              comment_id: commentIdInput.value.trim(),
              message: messageInput.value.trim(),
            }),
          });

          const data = await response.json();
          output.textContent = JSON.stringify(data, null, 2);
        } catch (error) {
          output.textContent = JSON.stringify(
            {
              ok: false,
              error: String(error.message || error),
            },
            null,
            2,
          );
        }
      }

      sendButton.addEventListener("click", sendTest);
    </script>
  </body>
</html>
