<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Boceto Caja Recaudacion Under</title>
<style>
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;background:#050505;color:#fff;font-family:Arial,Helvetica,sans-serif}
body{display:grid;place-items:center;padding:24px}
.stage{
  width:min(100%,980px);
  aspect-ratio:16/9;
  position:relative;
  overflow:hidden;
  border:5px solid #080808;
  background:
    radial-gradient(circle at 50% 46%,rgba(255,255,255,.12),transparent 24%),
    repeating-linear-gradient(0deg,rgba(255,255,255,.035) 0 1px,transparent 1px 4px),
    linear-gradient(180deg,#053cff 0%,#001fbd 52%,#00127d 100%);
  box-shadow:0 0 0 2px #fff,0 22px 60px rgba(0,0,0,.58);
}
.stage:before{
  content:"";
  position:absolute;
  inset:0;
  pointer-events:none;
  background:linear-gradient(90deg,rgba(0,0,0,.42),transparent 15%,transparent 85%,rgba(0,0,0,.42));
  mix-blend-mode:multiply;
}
.stage:after{
  content:"";
  position:absolute;
  inset:0;
  pointer-events:none;
  background:repeating-linear-gradient(90deg,rgba(255,255,255,.04) 0 2px,transparent 2px 5px);
  opacity:.35;
}
.content{
  position:absolute;
  inset:44px 58px;
  display:grid;
  grid-template-rows:auto 1fr auto;
  z-index:1;
  text-align:center;
  text-transform:uppercase;
}
.top-row{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:24px;
  align-items:center;
  margin:0 auto 18px;
  width:min(620px,100%);
}
.badge{
  min-height:72px;
  display:grid;
  place-items:center;
  border:4px solid #080808;
  background:#f5f1d5;
  color:#081366;
  box-shadow:7px 7px 0 rgba(0,0,0,.45);
  font-size:24px;
  font-weight:1000;
  letter-spacing:-1px;
}
.badge:nth-child(2){color:#d85719}
.badge:nth-child(3){color:#d82020}
.main{
  display:grid;
  place-items:center;
  gap:4px;
}
.eyebrow{
  color:#fff;
  font-size:clamp(22px,3.5vw,44px);
  line-height:.9;
  font-weight:1000;
  text-shadow:5px 5px 0 #000;
}
.title{
  color:#fff200;
  font-size:clamp(54px,9vw,128px);
  line-height:.82;
  font-weight:1000;
  letter-spacing:-5px;
  text-shadow:7px 7px 0 #000,0 0 8px rgba(255,242,0,.34);
}
.sub{
  color:#fff;
  font-size:clamp(22px,3.2vw,42px);
  line-height:1;
  font-weight:1000;
  text-shadow:5px 5px 0 #000;
}
.number{
  color:#fff200;
  font-size:clamp(64px,11vw,150px);
  line-height:.86;
  font-weight:1000;
  letter-spacing:-7px;
  text-shadow:8px 8px 0 #000;
}
.meta{
  display:grid;
  grid-template-columns:1.2fr .8fr .8fr;
  gap:14px;
  align-items:stretch;
}
.stat{
  border:4px solid #fff;
  background:rgba(0,0,0,.46);
  box-shadow:6px 6px 0 #000;
  padding:10px 12px;
}
.stat strong{
  display:block;
  color:#fff200;
  font-size:clamp(24px,3.6vw,46px);
  line-height:.9;
  text-shadow:4px 4px 0 #000;
}
.stat span{
  display:block;
  margin-top:6px;
  color:#fff;
  font-size:clamp(12px,1.35vw,18px);
  font-weight:1000;
  line-height:1.05;
  text-shadow:2px 2px 0 #000;
}
.progress{
  margin-top:10px;
  height:16px;
  border:3px solid #fff;
  background:#080808;
}
.fill{height:100%;width:64%;background:linear-gradient(90deg,#e01612,#fff200)}
.corner{
  position:absolute;
  right:22px;
  bottom:18px;
  z-index:2;
  color:#fff200;
  font-size:22px;
  font-weight:1000;
  text-shadow:3px 3px 0 #000;
  text-transform:uppercase;
}
.tag{
  position:absolute;
  left:24px;
  bottom:18px;
  z-index:2;
  display:flex;
  gap:8px;
  align-items:center;
  color:#fff;
  font-size:16px;
  font-weight:1000;
  text-shadow:3px 3px 0 #000;
  text-transform:uppercase;
}
.red{display:inline-block;background:#e01612;color:#fff;padding:2px 7px;border:2px solid #fff}
@media(max-width:720px){
  body{padding:10px}
  .stage{aspect-ratio:9/16}
  .content{inset:28px 18px}
  .top-row{grid-template-columns:1fr;gap:10px;width:70%}
  .badge{min-height:52px;font-size:18px}
  .meta{grid-template-columns:1fr}
  .title{letter-spacing:-3px}
  .number{letter-spacing:-4px}
}
</style>
</head>
<body>
  <main class="stage" aria-label="Boceto de recaudacion para YouTube">
    <section class="content">
      <div class="top-row">
        <div class="badge">STICKERS</div>
        <div class="badge">VENTA</div>
        <div class="badge">WORLD LOOP</div>
      </div>
      <div class="main">
        <div class="eyebrow">DE UN STICKER A</div>
        <div class="title">40.075 KM</div>
        <div class="sub">RECAUDADO ACTUAL</div>
        <div class="number">$55.00</div>
      </div>
      <div class="meta">
        <div class="stat">
          <strong>64%</strong>
          <span>Meta de plata</span>
          <div class="progress"><div class="fill"></div></div>
        </div>
        <div class="stat">
          <strong>18</strong>
          <span>Unidades vendidas</span>
        </div>
        <div class="stat">
          <strong>312 KM</strong>
          <span>World Loop</span>
        </div>
      </div>
    </section>
    <div class="tag"><span class="red">LIVE</span> progreso del reto</div>
    <div class="corner">REEL0K THE FOUNDER</div>
  </main>
</body>
</html>
